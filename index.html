<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="英単語アプリ">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英単語マスター：究極の音読版</title>
    <style>
        :root { --main: #e74c3c; --bg: #f8f9fa; --success: #00b894; --error: #ff7675; --dark: #2d3436; --blue: #3498db; --gold: #f1c40f; --purple: #9b59b6; --mic: #ff4757; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; transition: background-color 0.2s; overflow: hidden; }
        .container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; min-height: 540px; display: flex; flex-direction: column; justify-content: center; z-index: 5; }
        .timer-wrapper { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--main); transition: width 0.1s linear; }
        .menu-btn { display: block; width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 16px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-study { background: var(--blue); }
        .btn-challenge { background: var(--main); }
        .btn-weak { background: var(--purple); }
        .btn-speak { background: var(--mic); }
        .back-btn { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 20px; cursor: pointer; display: none; z-index: 10; }
        .high-score-tag { font-size: 14px; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .mode-container { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; padding: 10px; background: #f0f2f5; border-radius: 12px; font-size: 13px; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blue); }
        input:checked + .slider:before { transform: translateX(20px); }
        .grade-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }
        .grade-btn { padding: 8px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; font-size: 12px; }
        .grade-btn.active { background: var(--dark); color: white; border-color: var(--dark); }
        .word-display { font-size: 36px; font-weight: 800; color: var(--dark); margin: 20px 0; }
        .choice-btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #e1e1e1; border-radius: 12px; background: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        #result { font-size: 18px; font-weight: bold; margin: 10px 0; min-height: 24px; white-space: pre-line; line-height: 1.4; }
        .next-btn { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; display: none; cursor: pointer; }
        #result-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 24px; z-index: 20; flex-direction: column; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .shake-effect { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    </style>
</head>
<body>

<canvas id="canvas-confetti"></canvas>

<div class="container" id="main-container">
    <button class="back-btn" id="back-btn" onclick="showMenu()">🏠</button>
    <div class="timer-wrapper" id="timer-wrapper"><div id="timer-bar"></div></div>
    
    <div id="menu-area">
        <div id="high-score-display" class="high-score-tag">最高記録: 0 コンボ</div>
        <h1>英単語マスター</h1>
        <button class="menu-btn btn-study" onclick="initGame('study')">📖 じっくり学習</button>
        <button class="menu-btn btn-challenge" onclick="initGame('challenge')">🔥 1分チャレンジ</button>
        <button class="menu-btn btn-weak" onclick="initGame('weak')">🧠 苦手克服</button>
        <button class="menu-btn btn-speak" onclick="initGame('speak')">🎤 発音マスター</button>
    </div>

    <div id="setup-area" style="display: none;">
        <h2 id="setup-title">設定</h2>
        <div class="mode-container" id="dir-container">
            <span>出題方向</span>
            <span>英→日 <label class="switch"><input type="checkbox" id="dir-toggle" onchange="toggleInputMenu()"><span class="slider"></span></label> 日→英</span>
        </div>
        <div class="mode-container">
            <span>問題の読み上げ</span>
            <span>OFF <label class="switch"><input type="checkbox" id="hint-toggle" checked><span class="slider"></span></label> ON</span>
        </div>
        <div class="mode-container" id="input-method-container">
            <span>入力方法</span>
            <span>選択肢 <label class="switch"><input type="checkbox" id="input-toggle"><span class="slider"></span></label> タイピング</span>
        </div>
        <div class="grade-selector">
            <button class="grade-btn active" onclick="currentGrade=1; updateGradeUI(this)">中1</button>
            <button class="grade-btn" onclick="currentGrade=2; updateGradeUI(this)">中2</button>
            <button class="grade-btn" onclick="currentGrade=3; updateGradeUI(this)">中3</button>
            <button class="grade-btn" onclick="currentGrade=0; updateGradeUI(this)">全部</button>
        </div>
        <button class="menu-btn" onclick="startGame()" style="background:var(--dark);">スタート！</button>
    </div>

    <div id="game-area" style="display: none;">
        <div id="challenge-status" style="font-size:12px; height:15px; color:var(--gold);"></div>
        <div id="question-word" class="word-display">...</div>
        <div id="mic-trigger-area" style="display:none;"><button id="mic-btn" class="mic-btn" style="background: var(--mic); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); outline: none; -webkit-tap-highlight-color: transparent;" onclick="startListening()">🎤 タップして発音</button></div>
        <div id="choices-area"></div>
        <div id="typing-area" style="display:none;"><input type="text" id="answer-input" placeholder="..." autocomplete="off"></div>
        <div id="result"></div>
        <button id="next-button" class="next-btn" onclick="makeQuestion()">次へ (Enter)</button>
    </div>

    <div id="result-screen">
        <h1 id="result-title">終了！</h1>
        <div id="final-score" style="font-size: 28px; margin: 20px 0; white-space: pre-line;"></div>
        <button class="menu-btn btn-study" onclick="showMenu()" style="width: 80%;">戻る</button>
    </div>
</div>

let currentWord = null;
let quizList = [];
let weakWords = JSON.parse(localStorage.getItem('weakWords') || '[]');
let score = 0;
let combo = 0;
let currentGrade = 1; 
let isJpToEn = false;
let isTyping = false;
let isHintOn = true;
let gameState = 'menu';
let gameMode = 'study';
let timerInterval = null;
let challengeTime = 60;

function showMenu() {
    gameState = 'menu';
    clearInterval(timerInterval);
    document.getElementById('menu-area').style.display = 'block';
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('back-btn').style.display = 'none';
    document.getElementById('timer-wrapper').style.display = 'none';
    document.getElementById('high-score-display').innerText = `最高記録: ${localStorage.getItem('highCombo') || 0} コンボ`;
}

function initGame(mode) {
    gameMode = mode;
    document.getElementById('menu-area').style.display = 'none';
    document.getElementById('setup-area').style.display = 'block';
    document.getElementById('back-btn').style.display = 'block';
    document.getElementById('input-method-container').style.display = (mode === 'speak') ? 'none' : 'flex';
}

function toggleInputMenu() {
    isJpToEn = document.getElementById('dir-toggle').checked;
}

function updateGradeUI(btn) {
    document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function startGame() {
    isJpToEn = document.getElementById('dir-toggle').checked;
    isTyping = document.getElementById('input-toggle').checked;
    isHintOn = document.getElementById('hint-toggle').checked;

    let baseList = (gameMode === 'weak') ? weakWords : rawData;
    quizList = (currentGrade !== 0 && gameMode !== 'weak') ? baseList.filter(v => v.g === currentGrade) : [...baseList];

    if (quizList.length === 0) {
        alert("単語がありません！");
        return;
    }

    score = 0; combo = 0;
    gameState = 'playing';
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    
    if (gameMode === 'challenge') startChallengeTimer();
    makeQuestion();
}

// --- 修正箇所：makeQuestion ---
function makeQuestion() {
    if (gameState !== 'playing') return;
    currentWord = quizList[Math.floor(Math.random() * quizList.length)];
    
    document.getElementById('question-word').innerText = isJpToEn ? currentWord.m : currentWord.w;
    document.getElementById('result').innerText = "";
    document.getElementById('next-button').style.display = 'none';
    document.getElementById('answer-input').value = "";

    // 自動読み上げ（ヒントONの場合）
    if (isHintOn) {
        if (isJpToEn) {
            speak(currentWord.m, 'ja-JP'); // 日→英モードなら日本語で出題
        } else {
            speak(currentWord.w, 'en-US'); // 英→日モードなら英語で出題
        }
    }

    if (gameMode === 'speak') {
        document.getElementById('choices-area').style.display = 'none';
        document.getElementById('typing-area').style.display = 'none';
        document.getElementById('mic-trigger-area').style.display = 'block';
    } else if (isTyping) {
        document.getElementById('choices-area').style.display = 'none';
        document.getElementById('mic-trigger-area').style.display = 'none';
        document.getElementById('typing-area').style.display = 'block';
        document.getElementById('answer-input').focus();
    } else {
        document.getElementById('typing-area').style.display = 'none';
        document.getElementById('mic-trigger-area').style.display = 'none';
        document.getElementById('choices-area').style.display = 'block';
        generateChoices();
    }
}

// --- 修正箇所：speak (言語指定を強化) ---
function speak(text, lang = 'en-US', callback) {
    window.speechSynthesis.cancel();
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = lang;

    const voices = window.speechSynthesis.getVoices();
    if (lang.startsWith('en')) {
        const preferredVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Google') || v.name.includes('Samantha') || v.name.includes('Daniel')));
        if (preferredVoice) uttr.voice = preferredVoice;
        uttr.rate = 0.9;
    } else {
        const preferredVoice = voices.find(v => v.lang.includes('ja') && (v.name.includes('Otoya') || v.name.includes('Otoya') || v.name.includes('Google') || v.name.includes('Kyoko')));
        if (preferredVoice) uttr.voice = preferredVoice;
        uttr.rate = 1.1;
    }

    if (callback) uttr.onend = callback;
    window.speechSynthesis.speak(uttr);
}

function startListening() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Speech) return;
    const rec = new Speech();
    rec.lang = 'en-US';
    const btn = document.getElementById('mic-btn');
    btn.style.opacity = "0.5"; btn.innerText = "🎤 聞いています...";
    
    rec.onresult = (e) => {
        const transcript = e.results[0][0].transcript.toLowerCase();
        checkAnswer(transcript);
    };
    rec.onend = () => {
        btn.style.opacity = "1"; btn.innerText = "🎤 タップして発音";
    };
    rec.start();
}

// --- 修正箇所：checkAnswer (常に正解の英語を英語で発音) ---
function checkAnswer(userAns) {
    if (gameState !== 'playing') return;
    const isCorrect = isJpToEn ? (userAns.toLowerCase() === currentWord.w.toLowerCase()) : (userAns === currentWord.m);
    
    // モードに関わらず、回答後は常に「正解の英語」を「en-US」で発音する
    speak(currentWord.w, 'en-US');

    if (isCorrect) {
        score += 10; combo++;
        document.getElementById('result').innerText = "⭕ 正解！\n" + currentWord.w + " : " + currentWord.m;
        document.getElementById('result').style.color = "var(--success)";
        if (gameMode === 'study' || gameMode === 'weak') {
            document.getElementById('next-button').style.display = 'block';
            document.getElementById('next-button').focus();
        } else {
            setTimeout(makeQuestion, 800);
        }
    } else {
        combo = 0;
        document.getElementById('result').innerText = "❌ 不正解...\n正解: " + (isJpToEn ? currentWord.w : currentWord.m);
        document.getElementById('result').style.color = "var(--error)";
        document.body.classList.add('shake-effect');
        setTimeout(() => document.body.classList.remove('shake-effect'), 300);
        
        if (!weakWords.some(v => v.w === currentWord.w)) {
            weakWords.push(currentWord);
            localStorage.setItem('weakWords', JSON.stringify(weakWords));
        }

        if (gameMode === 'study' || gameMode === 'weak' || gameMode === 'speak') {
            document.getElementById('next-button').style.display = 'block';
            document.getElementById('next-button').focus();
        } else {
            setTimeout(makeQuestion, 1200);
        }
    }
    updateChallengeUI();
}

function generateChoices() {
    const area = document.getElementById('choices-area');
    area.innerHTML = "";
    let choices = [isJpToEn ? currentWord.w : currentWord.m];
    while (choices.length < 4) {
        let dummy = rawData[Math.floor(Math.random() * rawData.length)];
        let val = isJpToEn ? dummy.w : dummy.m;
        if (!choices.includes(val)) choices.push(val);
    }
    choices.sort(() => Math.random() - 0.5).forEach(c => {
        const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.innerText = c;
        btn.onclick = () => checkAnswer(c); area.appendChild(btn);
    });
}

function endGame() {
    gameState = 'result';
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('final-score').innerText = (gameMode === 'challenge') ? `スコア: ${score}\n最高コンボ: ${combo}` : `終了！`;
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, start, dur, vol) {
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + start + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + start); osc.stop(audioCtx.currentTime + start + dur);
}

function startChallengeTimer() {
    let timeLeft = challengeTime;
    document.getElementById('timer-wrapper').style.display = 'block';
    timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        document.getElementById('timer-bar').style.width = (timeLeft / challengeTime * 100) + "%";
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            endGame();
        }
    }, 100);
}

function updateChallengeUI() {
    if (gameMode === 'challenge') {
        document.getElementById('challenge-status').innerText = `Combo: ${combo} | Score: ${score}`;
        if (combo > (localStorage.getItem('highCombo') || 0)) {
            localStorage.setItem('highCombo', combo);
        }
    }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (gameState === 'playing') {
            if (document.getElementById('next-button').style.display === 'block') {
                makeQuestion();
            } else if (isTyping) {
                checkAnswer(document.getElementById('answer-input').value.trim());
            }
        }
    }
});

// 初期読み込み
window.speechSynthesis.getVoices();
showMenu();
</script>
